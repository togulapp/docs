openapi: 3.1.0
info:
  title: Togul Feature Flag API
  version: 1.14.0
  description: Feature flag management API with organization-scoped permission-based authorization, project-based resource grouping, machine-authenticated evaluation, multi-provider billing (Stripe and LemonSqueezy), lifecycle flows, and automatic multi-region assignment.

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Organizations
    description: Organization management
  - name: Members
    description: Organization member management
  - name: Roles
    description: Organization role and permission management
  - name: Invitations
    description: Organization invitation management
  - name: Projects
    description: Project management (workspace layer between Organization and Environment)
  - name: Project Members
    description: Project membership management
  - name: API Keys
    description: Project-scoped API key management
  - name: Usage
    description: Usage metering and reporting
  - name: Billing
    description: Subscription and billing management
  - name: Exports
    description: Data export management
  - name: Account Lifecycle
    description: Account deletion request tracking
  - name: Environments
    description: Environment management
  - name: Flags
    description: Flag management
  - name: Rules
    description: Rule management
  - name: Evaluate
    description: Flag evaluation
  - name: Stream
    description: Real-time SSE updates
  - name: Infrastructure
    description: Health and metrics

paths:
  /api/v1/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Creates the user, creates the initial organization with owner membership, and generates an email verification token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, username, password]
              properties:
                name:
                  type: string
                  example: Onur Kacmaz
                username:
                  type: string
                  format: email
                  example: onur@example.com
                password:
                  type: string
                  format: password
                  example: mypassword123
      responses:
        "200":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/login:
    post:
      tags: [Auth]
      summary: Login and get organization-scoped JWT tokens
      description: Returns the current organization context and the caller's accessible organizations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  format: email
                  example: onur@example.com
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/refresh-token:
    post:
      tags: [Auth]
      summary: Refresh organization-scoped JWT token
      description: Rotates the refresh token and returns an updated organization-scoped session payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/verify-email:
    post:
      tags: [Auth]
      summary: Verify email address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean
                    example: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Password reset flow started
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent:
                    type: boolean
                    example: true
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using a one-time token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                new_password:
                  type: string
                  format: password
      responses:
        "200":
          description: Password reset completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  reset:
                    type: boolean
                    example: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me:
    get:
      tags: [Auth]
      summary: Get current user and organization context
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user and organization context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [Auth]
      summary: Update current user account details
      description: |
        Updates the authenticated user's account profile.
        Changing the email address clears `email_verified_at` and sends a fresh verification email.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeRequest"
      responses:
        "200":
          description: Account updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/me/switch-organization:
    post:
      tags: [Auth]
      summary: Switch the current organization
      description: Requires an active refresh token and returns a rotated organization-scoped session.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [organization_id, refresh_token]
              properties:
                organization_id:
                  type: string
                  format: uuid
                refresh_token:
                  type: string
      responses:
        "200":
          description: Organization switched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke the current session
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  logged_out:
                    type: boolean
                    example: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/resend-verification:
    post:
      tags: [Auth]
      summary: Resend email verification token
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Verification token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  sent:
                    type: boolean
                    example: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/billing/subscription:
    get:
      tags: [Billing]
      summary: Get the current subscription and entitlements
      description: Requires `billing.read` permission.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Subscription summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscription:
                    $ref: "#/components/schemas/SubscriptionSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/pricing/plans:
    get:
      tags: [Billing]
      summary: Get the public pricing plan catalog
      description: Returns pricing-plan information without requiring authentication or current subscription context.
      responses:
        "200":
          description: Public billing plan catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicBillingPlansResponse"

  /api/v1/billing/plans:
    get:
      tags: [Billing]
      summary: Get the billing plan catalog and current-plan actions
      description: Requires `billing.read` permission.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Billing plan catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingPlansResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  
  /api/v1/billing/checkout:
    post:
      tags: [Billing]
      summary: Create a checkout session for a paid plan
      description: Requires `billing.write` permission.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan]
              properties:
                plan:
                  type: string
                  enum: [pro, enterprise]
                success_url:
                  type: string
                  format: uri
                cancel_url:
                  type: string
                  format: uri
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          description: Billing provider error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/billing/portal:
    post:
      tags: [Billing]
      summary: Create a billing portal session
      description: Requires `billing.read` permission.
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                return_url:
                  type: string
                  format: uri
      responses:
        "200":
          description: Billing portal session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/webhooks/stripe:
    post:
      tags: [Billing]
      summary: Stripe webhook endpoint
      description: Accepts Stripe webhook events, verifies signatures, and applies idempotent subscription synchronization.
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/webhooks/lemonsqueezy:
    post:
      tags: [Billing]
      summary: LemonSqueezy webhook endpoint
      description: Accepts LemonSqueezy webhook events, verifies HMAC-SHA256 signatures, and applies idempotent subscription synchronization. Handles order_created, subscription_created, subscription_updated, subscription_expired, subscription_cancelled, and subscription_payment_success events.
      parameters:
        - name: X-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/exports/audit:
    post:
      tags: [Exports]
      summary: Create an audit log export
      description: Requires `exports.write` permission. The export is generated immediately and stored through the configured export storage backend.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Audit export created
          content:
            application/json:
              schema:
                type: object
                properties:
                  export:
                    $ref: "#/components/schemas/DataExport"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/exports/account-data:
    post:
      tags: [Exports]
      summary: Create an account data export
      description: Requires `exports.write` permission. Produces a snapshot of organization-scoped data excluding secrets.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Account data export created
          content:
            application/json:
              schema:
                type: object
                properties:
                  export:
                    $ref: "#/components/schemas/DataExport"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/exports:
    get:
      tags: [Exports]
      summary: List export jobs for the current organization
      description: Requires `exports.write` permission.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Exports listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  exports:
                    type: array
                    items:
                      $ref: "#/components/schemas/DataExport"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/account-deletion:
    get:
      tags: [Account Lifecycle]
      summary: List account deletion requests for the current organization
      description: Requires `org.delete` permission.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Account deletion requests listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      $ref: "#/components/schemas/AccountDeletionRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Account Lifecycle]
      summary: Request account deletion
      description: Requires `org.delete` permission. The request is recorded and scheduled; it does not immediately remove data.
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Account deletion requested
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    $ref: "#/components/schemas/AccountDeletionRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"


  /api/v1/organizations:
    post:
      tags: [Organizations]
      summary: Create a new organization
      description: Creates a new organization and assigns the caller as the owner. No organization-level permission is required since this is a user-level action.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Acme Corp
      responses:
        "200":
          description: Organization created
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    $ref: "#/components/schemas/OrganizationSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/organizations/current:
    get:
      tags: [Organizations]
      summary: Get current organization details
      description: Requires `org.read` permission.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Organizations]
      summary: Update current organization
      description: Requires `org.update` permission. Only provided fields are updated.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Acme Corp Updated
      responses:
        "200":
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/organizations/{id}:
    delete:
      tags: [Organizations]
      summary: Delete an organization by ID
      description: Requires `org.delete` permission. The caller must be a member of the target organization and must belong to at least one other organization; deleting the last organization is not allowed. Uses soft delete — data is retained but inaccessible.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Organization deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                    example: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/members:
    get:
      tags: [Members]
      summary: List organization members
      description: Requires `members.read` permission.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Members listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/Member"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/members/{id}:
    patch:
      tags: [Members]
      summary: Change a member's role
      description: Requires `members.update` permission.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_id]
              properties:
                role_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Member updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  member:
                    $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [Members]
      summary: Remove a member from the organization
      description: Requires `members.remove` permission.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                    example: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/roles:
    get:
      tags: [Roles]
      summary: List built-in and custom roles for the current organization
      description: Requires `roles.read` permission.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Roles listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items:
                      $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Roles]
      summary: Create a custom role
      description: Requires `roles.create` permission.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, name, permissions]
              properties:
                key:
                  type: string
                  example: release_manager
                name:
                  type: string
                  example: Release Manager
                permissions:
                  type: array
                  items:
                    type: string
                  example: [flags.read, flags.write, rules.read, rules.write]
      responses:
        "200":
          description: Role created
          content:
            application/json:
              schema:
                type: object
                properties:
                  role:
                    $ref: "#/components/schemas/Role"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/roles/{id}:
    patch:
      tags: [Roles]
      summary: Update a custom role
      description: Requires `roles.update` permission. System roles cannot be modified.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                permissions:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  role:
                    $ref: "#/components/schemas/Role"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [Roles]
      summary: Delete a custom role
      description: Requires `roles.delete` permission. Roles assigned to members cannot be deleted.
      security:
        - BearerAuth: []
      parameters:
