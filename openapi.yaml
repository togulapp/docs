      summary: Get usage overview for the current organization
      description: |
        Requires `usage.read` permission.
        Returns evaluation usage for the selected range together with the current month's quota snapshot.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: from
          schema:
            type: string
          description: Inclusive start day. Accepts RFC3339 or `YYYY-MM-DD`. Defaults to the current UTC month start.
          example: "2026-03-01"
        - in: query
          name: to
          schema:
            type: string
          description: Inclusive end day. Accepts RFC3339 or `YYYY-MM-DD`. Defaults to today in UTC.
          example: "2026-03-20"
      responses:
        "200":
          description: Usage overview returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageOverview"
