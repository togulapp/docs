        flag_id:
          type: string
          format: uuid
        priority:
          type: integer
        rule_type:
          type: string
          enum: [boolean, attribute, percentage]
        attribute:
          type: string
          nullable: true
        operator:
          type: string
          nullable: true
          enum: [eq, neq, in, not_in, contains, starts_with, ends_with]
        value_json:
          type: string
          nullable: true
        rollout_percentage:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        bucket_by:
          type: string
          default: user_id
        return_value:
          type: boolean
        is_active:
          type: boolean
          default: true

    EvaluateResponse:
      type: object
      properties:
        flag_key:
          type: string
        enabled:
          type: boolean
        value:
          type: boolean
        reason:
          type: string
          enum: [disabled, rule_match, default]

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          nullable: true

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid authorization
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
