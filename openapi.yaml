      description: |
        Requires `usage.read` permission.
        Returns evaluation counts bucketed by day and fills missing days with zeroes.
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: from
          schema:
            type: string
          description: Inclusive start day. Accepts RFC3339 or `YYYY-MM-DD`. Defaults to the current UTC month start.
          example: "2026-03-01"
        - in: query
          name: to
