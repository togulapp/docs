name: Notify SDKs

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  notify-sdks:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'Sync OpenAPI spec to')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [togul-go, togul-php, togul-laravel, togul-ruby, togul-js]
    steps:
      - name: Extract version from PR title
        id: version
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          VERSION="${PR_TITLE#Sync OpenAPI spec to }"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create issue in SDK repo
        env:
          GH_TOKEN: ${{ secrets.TOGUL_SYNC_TOKEN }}
          REPO: ${{ matrix.repo }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BODY=$(cat <<'EOTEMPLATE'
          ## API Contract Changed

          The `openapi.yaml` in [togulapp/togul](https://github.com/togulapp/togul) has been updated and docs are live.

          Please review the changes and update the SDK accordingly.

          ### Checklist
          - [ ] Review endpoint changes
          - [ ] Update SDK client methods if needed
          - [ ] Update tests
          - [ ] Bump SDK version
          EOTEMPLATE
          )

          gh issue create \
            --repo "togulapp/$REPO" \
            --title "API contract updated to $VERSION" \
            --body "$BODY"
